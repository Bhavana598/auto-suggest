<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <style>
        .left-bar {
           position: fixed;
            top: 20px;
            left: 20px;
        }
        .right-bar {
           position: fixed;
            top: 20px;
            right: 20px;
        }
        .search-bar {
            text-align: center;
            margin-top: 100px;
        }
        .logo-color {
            color: purple;
        }
        .tag-line {
            color: gray;
        }
        .lens {
            position: relative;
            left: 35px;
        }
        .search-box {
            padding: 15px 15px 15px 45px;
            border-radius: 20px;
            width:40%;
        } 
        #suggestion-box{
            border: 1px solid black;
            border-radius: 30px;
            margin-left: 29%;
            padding: 15px 15px 15px 45px;
            width: 40%;
        }
    </style>
</head>
<body>
    <div>
    <span class="left-bar">&#9881;</span>
    <span class="right-bar">&#8226; online | &#128337; - ms</span>
</div>
    <div class="search-bar">
    <h1><span class="logo-color">Bhavana</span> Manthena</h1>
    <p class="tag-line">One million phrases. Four algorithms. Prefix Based Auto Suggest</p>
    <span>
        <span class="lens">&#128269;</span>
        <input class="search-box" placeholder="Search here...">
    </span>
    <div id="suggestion-box">
       suggestion box
    </div>
    </div>

</html>
